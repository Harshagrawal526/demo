name: Create Jira Task from Commit
on:
  push:
    branches:
      - main # Change this if you want it to trigger on a different branch

jobs:
  create-jira-issue:
    runs-on: ubuntu-latest
    steps:
      - name: Send API Request to Jira
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_USER_EMAIL: ${{ secrets.JIRA_USER_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          EPIC_KEY: "HS-1" # <-- REPLACE WITH YOUR EPIC KEY
          PROJECT_KEY: "HS"  # <-- REPLACE WITH YOUR PROJECT KEY
        run: |
          # Grab the commit message and clean it for JSON formatting
          COMMIT_MSG="${{ github.event.head_commit.message }}"
          CLEAN_MSG=$(echo "$COMMIT_MSG" | sed 's/"/\\"/g' | tr -d '\n')
          
          # Construct the JSON payload
          PAYLOAD="{
            \"fields\": {
              \"project\": { \"key\": \"$PROJECT_KEY\" },
              \"summary\": \"$CLEAN_MSG\",
              \"description\": \"Automated task from GitHub commit: ${{ github.sha }}\",
              \"issuetype\": { \"name\": \"Task\" },
              \"parent\": { \"key\": \"$EPIC_KEY\" }
            }
          }"
          
          # Print the payload to GitHub logs for debugging
          echo "DEBUG: Sending the following payload to Jira:"
          echo "$PAYLOAD"
          
          # Hit the Jira REST API
          curl -X POST \
            -u "$JIRA_USER_EMAIL:$JIRA_API_TOKEN" \
            -H "Content-Type: application/json" \
            --data "$PAYLOAD" \
            "$JIRA_BASE_URL/rest/api/2/issue"
